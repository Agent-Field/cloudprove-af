# CloudProve-AF agent-only compose — connects to host CP (not containerized)
# Usage: OPENROUTER_API_KEY=sk-or-... docker compose -f docker-compose.local.yml up --build
services:
  cloudprove-af:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudprove-af-agent
    ports:
      - "8005:8005"
    environment:
      - AGENTFIELD_SERVER=http://host.docker.internal:8080
      - AGENT_CALLBACK_URL=http://host.docker.internal:8005
      - HARNESS_PROVIDER=opencode
      - HARNESS_MODEL=openrouter/anthropic/claude-3.7-sonnet
      - AI_MODEL=openrouter/anthropic/claude-3.7-sonnet
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - cloudprove-af-workspaces:/workspaces
      - ./benchmark:/app/benchmark
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  cloudprove-af-workspaces:
